name: CI & Deploy
on:
  push:
    branches: [develop, main]
jobs:
  ci:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          NEXT_PUBLIC_SOCIAL_MINING_ADDRESS: ${{ vars.SOCIAL_MINING_ADDRESS }}
          NEXT_PUBLIC_WVRN_TOKEN_ADDRESS: ${{ vars.WVRN_TOKEN_ADDRESS }}
          NEXT_PUBLIC_CHAIN_ID: ${{ vars.CHAIN_ID }}
          NEXT_PUBLIC_GOATCOUNTER_URL: ${{ vars.GOATCOUNTER_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/
      - name: Deploy to droplet
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.DROPLET_IP }}
          TARGET: /opt/${{ github.ref_name == 'main' && 'prod' || 'dev' }}/weavrn-landing/out/
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -rlgoDzvc --delete -e "ssh -i ~/.ssh/deploy_key" out/ "root@${HOST}:${TARGET}"
