<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Weavrn logo: abstract W formed by interconnected nodes and paths -->
  <!-- Dark background circle for standalone use -->
  <circle cx="256" cy="256" r="256" fill="#0A0A0F"/>

  <!-- W shape made of connected strokes -->
  <path
    d="M128 160 L176 352 L256 224 L336 352 L384 160"
    stroke="url(#grad)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Node dots at vertices -->
  <circle cx="128" cy="160" r="14" fill="#00D4AA"/>
  <circle cx="176" cy="352" r="14" fill="#00B8D4"/>
  <circle cx="256" cy="224" r="14" fill="#00C4BA"/>
  <circle cx="336" cy="352" r="14" fill="#00B8D4"/>
  <circle cx="384" cy="160" r="14" fill="#00A3FF"/>

  <!-- Cross-weave connections -->
  <line x1="128" y1="160" x2="256" y2="224" stroke="#00D4AA" stroke-width="6" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="384" y1="160" x2="256" y2="224" stroke="#00A3FF" stroke-width="6" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="176" y1="352" x2="336" y2="352" stroke="#00B8D4" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round"/>

  <defs>
    <linearGradient id="grad" x1="128" y1="256" x2="384" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
  </defs>
</svg>
